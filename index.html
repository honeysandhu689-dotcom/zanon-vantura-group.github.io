<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zanon-Vantura Synergy Group | 10X Machine</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Poppins', sans-serif; background: #000; color: #e0e0ff; overflow-x: hidden; }

    /* गोल्डन मनी एनीमेशन */
    #tsparticles { position: fixed; inset: 0; z-index: -2; }

    header {
      position: fixed; top: 0; left: 0; right: 0; padding: 15px 6%;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(0, 5, 20, 0.85); backdrop-filter: blur(15px);
      border-bottom: 2px solid #DAA520; z-index: 999;
    }

    .logo { font-family: 'Orbitron'; font-size: 2rem; color: #DAA520; text-shadow: 0 0 15px #DAA520; }
    
    nav { display: flex; align-items: center; gap: 20px; }
    nav a { color: #fff; text-decoration: none; font-weight: 600; font-size: 0.9rem; }

    /* असली गूगल ट्रांसलेट को मेनू में छिपाना */
    #google_translate_element { display: none !important; }
    .goog-te-banner-frame { display: none !important; }
    body { top: 0 !important; }

    /* नया सुंदर लैंग्वेज बटन */
    .custom-lang-selector {
      background: linear-gradient(45deg, #DAA520, #ffd700);
      color: black; border: none; padding: 8px 15px; border-radius: 5px;
      font-weight: bold; cursor: pointer; font-family: 'Orbitron';
    }

    section { padding: 150px 6% 50px; text-align: center; }
    .glitch-big { font-size: 5rem; font-family: 'Orbitron'; font-weight: 900; color: #DAA520; text-shadow: 0 0 30px #DAA52055; margin-bottom: 20px; }

    .invest-card {
      background: rgba(0, 10, 30, 0.9); border: 3px solid #DAA520; border-radius: 25px;
      padding: 40px; margin: 30px auto; max-width: 650px; box-shadow: 0 0 50px rgba(218, 165, 32, 0.3);
    }

    input, .file-input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #00ffff; background: #000; color: #fff; }
    .btn-submit { width: 100%; padding: 20px; background: #DAA520; color: #000; font-weight: 900; border: none; border-radius: 50px; cursor: pointer; font-size: 1.2rem; }
  </style>
</head>
<body>

  <div id="tsparticles"></div>
  <div id="google_translate_element"></div>

  <header>
    <div class="logo">ZANON-VANTURA</div>
    <nav>
      <a href="#home">HOME</a>
      <a href="#portal">PORTAL</a>
      <select class="custom-lang-selector" onchange="translatePage(this.value)">
        <option value="">🌐 LANGUAGE</option>
        <option value="hi">हिन्दी (Hindi)</option>
        <option value="en">English</option>
        <option value="pa">ਪੰਜਾਬੀ (Punjabi)</option>
        <option value="es">Español</option>
      </select>
    </nav>
  </header>

  <section id="home">
    <h1 class="glitch-big">10X GROWTH MACHINE</h1>
    <div id="liveCount" style="font-size: 4rem; color: #ffd700; font-family: 'Orbitron';">0</div>
    <p style="color: #00ffff; letter-spacing: 2px;">GLOBAL VISIONARIES JOINED</p>

    <div class="invest-card" id="portal">
      <h2 style="color: #DAA520; font-family: 'Orbitron';">INVESTOR PORTAL</h2>
      <p style="color: #ff00cc; font-weight: bold;">FEE: ₹50 | 10X RETURN (5 YEARS)</p>
      
      <form id="synergyForm">
        <input type="text" id="userName" placeholder="आपका पूरा नाम (Full Name)" required>
        <input type="text" id="pName" placeholder="पिता/पति का नाम (Parent Name)" required>
        <p style="text-align: left; color: #DAA520; margin-top: 10px;">दस्तावेज अपलोड (Choose Files):</p>
        <input type="file" class="file-input" required>
        <input type="file" class="file-input" required>
        <button type="submit" class="btn-submit">SUBMIT & REGISTER →</button>
      </form>
    </div>
  </section>

  <footer style="padding: 40px; text-align: center; border-top: 1px solid #DAA520;">
    <p>© 2026 Zanon-Vantura Synergy Group | सिमरनजीत सिंह संधू | लुधियाना</p>
  </footer>

  <script type="text/javascript">
    // गूगल ट्रांसलेट को शुरू करने का तरीका
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({pageLanguage: 'hi', autoDisplay: false}, 'google_translate_element');
    }

    // बिना पॉप-अप के भाषा बदलने वाला जादुई फंक्शन
    function translatePage(lang) {
      var selectField = document.querySelector(".goog-te-combo");
      if (selectField) {
        selectField.value = lang;
        selectField.dispatchEvent(new Event('change'));
      }
    }

    // पैसे वाली एनीमेशन (Money Particles)
    tsParticles.load("tsparticles", {
      particles: {
        number: { value: 60 },
        color: { value: "#ffd700" },
        shape: { type: "char", options: { char: { value: ["₹", "$", "💰"] } } },
        opacity: { value: 0.6 },
        size: { value: 12 },
        move: { enable: true, speed: 2, direction: "bottom" }
      }
    });

    // काउंटर सिस्टम
    let currentVal = 0;
    document.getElementById('synergyForm').addEventListener('submit', function(e) {
      e.preventDefault();
      currentVal++;
      document.getElementById('liveCount').innerText = currentVal;
      alert("Success! Documents Uploaded.");
    });
  </script>
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
