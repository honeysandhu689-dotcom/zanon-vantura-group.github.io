<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zanon-Vantura Synergy Group | Direct Portal</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

  <style>
    /* आपका वही ओरिजिनल डिज़ाइन और एनीमेशन */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Poppins', sans-serif; background: #050014; color: #e0e0ff; overflow-x: hidden; }
    #vanta-bg { position: fixed; inset: 0; z-index: -3; }
    #tsparticles { position: fixed; inset: 0; z-index: -2; }

    header {
      position: fixed; top: 0; left: 0; right: 0; padding: 20px 6%;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(5, 0, 20, 0.7); backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(0,255,255,0.18); z-index: 999;
    }

    .logo { font-family: 'Orbitron'; font-size: 2.2rem; font-weight: 900; color: #00ffff; text-shadow: 0 0 25px #00ffff99; }

    section { padding: 140px 6% 100px; text-align: center; }
    .glitch { font-size: 5rem; font-family: 'Orbitron'; background: linear-gradient(90deg, #00ffff, #ff00cc, #ffd700, #00ffff); background-size: 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: glitchFlow 8s linear infinite; }
    @keyframes glitchFlow { 0% { background-position: 0% 50%; } 100% { background-position: 400% 50%; } }

    /* काउंटर जो 0 से शुरू होगा */
    .counter-display { font-family: 'Orbitron'; font-size: 4.5rem; color: #ffd700; text-shadow: 0 0 30px #ffd700; margin: 20px 0; }

    /* नया डायरेक्ट अपलोड कार्ड (डिज़ाइन के साथ मैच करता हुआ) */
    .invest-card { 
      background: rgba(15, 10, 40, 0.85); border: 2px solid #DAA520; 
      border-radius: 25px; padding: 40px; margin: 40px auto; max-width: 650px;
      box-shadow: 0 0 50px rgba(218, 165, 32, 0.3); backdrop-filter: blur(10px);
    }

    input, .file-btn { 
      width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; 
      border: 1px solid #00ffff; background: rgba(0,0,0,0.6); color: white; font-size: 1rem;
    }

    label { display: block; text-align: left; color: #DAA520; font-weight: bold; margin-top: 10px; }

    .btn-submit { 
      padding: 18px 50px; font-size: 1.4rem; font-weight: 900;
      background: linear-gradient(45deg, #ff00cc, #00ffff); color: white;
      border: none; border-radius: 50px; cursor: pointer; transition: 0.5s; width: 100%; margin-top: 20px;
    }
    .btn-submit:hover { transform: scale(1.05); box-shadow: 0 0 40px #00ffff; }

    /* लैंग्वेज बटन */
    #google_translate_element { position: fixed; top: 90px; right: 20px; z-index: 1000; }
  </style>
</head>
<body>

  <div id="vanta-bg"></div>
  <div id="tsparticles"></div>
  <div id="google_translate_element"></div>

  <header><div class="logo">Zanon-Vantura</div></header>

  <section>
    <h1 class="glitch">1 LAKH MISSION</h1>
    
    <div class="counter-display" id="mainCounter">0</div>
    <p style="font-size: 1.5rem; color: #00ffff;">INVESTORS JOINED</p>

    <div class="invest-card">
      <h2 style="color: #DAA520; font-family: 'Orbitron'; margin-bottom: 20px;">INVESTOR PORTAL</h2>
      <p style="color: #ff00cc; font-weight: bold;">FEE: ₹50 | 10X RETURN GUARANTEED</p>
      
      <form id="synergyForm">
        <input type="text" id="userName" placeholder="आपका पूरा नाम (Full Name)" required>
        <input type="text" id="parentName" placeholder="पिता/पति का नाम (Parent Name)" required>
        
        <label>1. एग्रीमेंट की फोटो सेलेक्ट करें:</label>
        <input type="file" id="agreementFile" class="file-btn" accept="image/*" required>
        
        <label>2. पेमेंट स्क्रीनशॉट सेलेक्ट करें:</label>
        <input type="file" id="paymentFile" class="file-btn" accept="image/*" required>

        <button type="submit" class="btn-submit">SUBMIT & REGISTER →</button>
      </form>
    </div>
  </section>

  <script type="text/javascript">
    // गूगल ट्रांसलेट
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({pageLanguage: 'hi'}, 'google_translate_element');
    }

    // काउंटर और फॉर्म सिस्टम
    let currentCount = 0;
    const form = document.getElementById('synergyForm');
    
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        // सबमिट होने पर काउंटर बढ़ाना
        currentCount++;
        document.getElementById('mainCounter').innerText = currentCount;
        
        alert("बधाई हो! आपके दस्तावेज़ सफलतापूर्वक अपलोड हो गए हैं। सिमरनजीत सिंह संधू की टीम आपसे जल्द संपर्क करेगी।");
        form.reset();
    });

    // वंता एनीमेशन (वही जो पहले था)
    VANTA.NET({
      el: "#vanta-bg",
      mouseControls: true,
      color: 0x00ffff,
      backgroundColor: 0x050014,
      points: 12
    });

    tsParticles.load("tsparticles", {
      particles: {
        number: { value: 50 },
        color: { value: "#ff00cc" },
        move: { enable: true, speed: 1.2 }
      }
    });
  </script>
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
