<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zanon-Vantura | Direct Upload Portal</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Poppins', sans-serif; background: #050014; color: #e0e0ff; overflow-x: hidden; }
    #vanta-bg { position: fixed; inset: 0; z-index: -3; }
    header { position: fixed; top: 0; left: 0; right: 0; padding: 20px; text-align: center; background: rgba(5, 0, 20, 0.8); border-bottom: 2px solid #00ffff; z-index: 999; }
    .logo { font-family: 'Orbitron'; font-size: 2rem; color: #00ffff; }

    section { padding: 120px 6% 50px; text-align: center; }
    .glitch { font-size: 4rem; font-family: 'Orbitron'; background: linear-gradient(90deg, #00ffff, #ff00cc, #ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* काउंटर */
    .counter-box { font-size: 3.5rem; color: #ffd700; font-family: 'Orbitron'; text-shadow: 0 0 20px #ffd700; margin: 20px 0; }

    /* अपलोड फॉर्म कार्ड */
    .upload-card { 
      background: rgba(10, 10, 30, 0.95); border: 3px solid #DAA520; 
      border-radius: 30px; padding: 40px; margin: 30px auto; max-width: 600px;
      box-shadow: 0 0 60px rgba(218, 165, 32, 0.4);
    }

    input, .file-input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 2px solid #00ffff; background: #000; color: #fff; font-size: 1rem; }
    
    label { display: block; text-align: left; margin-top: 10px; color: #DAA520; font-weight: bold; }

    .btn-submit { 
      width: 100%; padding: 20px; font-size: 1.5rem; font-weight: 900;
      background: linear-gradient(45deg, #00ffff, #ff00cc); color: white;
      border: none; border-radius: 50px; cursor: pointer; margin-top: 20px;
      box-shadow: 0 0 30px #ff00cc66; transition: 0.3s;
    }
    .btn-submit:hover { transform: scale(1.05); box-shadow: 0 0 50px #ff00cc; }
  </style>
</head>
<body>

  <div id="vanta-bg"></div>

  <header><div class="logo">ZANON-VANTURA SYNERGY</div></header>

  <section>
    <h1 class="glitch">1 LAKH MISSION</h1>
    <div class="counter-box" id="countDisplay">0</div>
    <p style="color: #00ffff;">LIVE INVESTORS JOINED</p>

    <div class="upload-card">
      <h2 style="color: #DAA520; margin-bottom: 20px;">रजिस्ट्रेशन एवं दस्तावेज अपलोड</h2>
      
      <form id="investorForm">
        <input type="text" id="name" placeholder="आपका पूरा नाम (Full Name)" required>
        <input type="text" id="parent" placeholder="पिता/पति का नाम (Parent Name)" required>
        <input type="tel" id="phone" placeholder="मोबाइल नंबर (WhatsApp No.)" required>
        
        <label>1. एग्रीमेंट की फोटो अपलोड करें:</label>
        <input type="file" id="agreementFile" class="file-input" accept="image/*" required>
        
        <label>2. पेमेंट स्क्रीनशॉट (₹50 + निवेश):</label>
        <input type="file" id="paymentFile" class="file-input" accept="image/*" required>

        <button type="submit" class="btn-submit">SUBMIT & REGISTER →</button>
      </form>
      <p style="margin-top: 20px; font-size: 0.8rem; color: #aaa;">*आपका डेटा एन्क्रिप्टेड और सुरक्षित है।*</p>
    </div>
  </section>

  <script>
    // काउंटर सिस्टम
    let count = 0;
    const form = document.getElementById('investorForm');
    
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        // यहां हम ईमेल भेजने या डेटा स्टोर करने का मैसेज देंगे
        alert("दस्तावेज सफलतापूर्वक अपलोड हो गए हैं! हम आपके ईमेल " + document.getElementById('name').value + " पर कन्फर्मेशन भेजेंगे।");
        
        // काउंट बढ़ाना
        count++;
        document.getElementById('countDisplay').innerText = count;
        
        // फॉर्म साफ़ करना
        form.reset();
        
        // असली दुनिया में, यहाँ हम एक Google Apps Script को डेटा भेजेंगे
    });

    VANTA.NET({
      el: "#vanta-bg",
      mouseControls: true,
      color: 0x00ffff,
      backgroundColor: 0x050014,
      points: 12
    });
  </script>

</body>
</html>
